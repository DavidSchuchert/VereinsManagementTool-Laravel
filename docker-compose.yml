services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vereinsmanagement-app
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8181:8000"
    environment:
      APP_NAME: VereinsManagementTool
      APP_ENV: local
      APP_KEY: "base64:d4AORLHB87UeakEHZI7uP4mtWfQT3+Ps2MT+H48q0EE="
      APP_DEBUG: "true"
      APP_TIMEZONE: Europe/Berlin
      APP_URL: "http://localhost:8181"
      APP_LOCALE: de
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: de_DE
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: vereinsmanagement
      DB_USERNAME: vereinsuser
      DB_PASSWORD: vereinspass
      SESSION_DRIVER: file
      FILESYSTEM_DISK: public
      QUEUE_CONNECTION: sync
      CACHE_STORE: file
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: "info@vereinsmanagement.test"
      MAIL_FROM_NAME: VereinsManagementTool
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - vereinsnetzwerk

  mariadb:
    image: mariadb:10.11
    container_name: vereinsmanagement-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vereinsmanagement
      MYSQL_USER: vereinsuser
      MYSQL_PASSWORD: vereinspass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vereinsnetzwerk

networks:
  vereinsnetzwerk:
    driver: bridge

volumes:
  mariadb_data:
